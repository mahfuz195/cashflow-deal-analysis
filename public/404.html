<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Deal Wise Rent</title>
    <script>
      // GitHub Pages SPA redirect
      // Encodes the full path into a query string so index.html can restore it
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/' +
        '?p=' + encodeURIComponent(l.pathname + l.search) +
        (l.hash ? '&h=' + encodeURIComponent(l.hash) : '')
      );
    </script>
  </head>
  <body></body>
</html>
