<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="roof" x1="32" y1="11" x2="32" y2="31" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square with gradient -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect width="64" height="64" rx="13" fill="white" opacity="0.04"/>

  <!-- House roof (triangle) -->
  <path d="M32 11 L8 31 L56 31 Z" fill="url(#roof)" filter="url(#shadow)"/>

  <!-- Roof ridge cap -->
  <circle cx="32" cy="11" r="2.5" fill="white" opacity="0.9"/>

  <!-- House body -->
  <rect x="11" y="31" width="42" height="22" rx="0" fill="white" opacity="0.92"/>

  <!-- Chimney -->
  <rect x="42" y="17" width="5" height="14" rx="1" fill="#cbd5e1"/>

  <!-- Bar chart inside house (ascending left to right) -->
  <!-- Bar 1 — short -->
  <rect x="15" y="46" width="7" height="7" rx="1.5" fill="url(#bar1)"/>
  <!-- Bar 2 — medium -->
  <rect x="26" y="39" width="7" height="14" rx="1.5" fill="url(#bar2)"/>
  <!-- Bar 3 — tall -->
  <rect x="37" y="33" width="7" height="20" rx="1.5" fill="url(#bar3)"/>

  <!-- Upward arrow on tallest bar -->
  <path d="M40.5 30 L40.5 34" stroke="#86efac" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M38.5 32.5 L40.5 30 L42.5 32.5" fill="none" stroke="#86efac" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
