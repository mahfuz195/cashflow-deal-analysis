<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Deep indigo-to-navy gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#0c0a2e"/>
    </linearGradient>

    <!-- Subtle inner highlight at the top (glass effect) -->
    <radialGradient id="gloss" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="white" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>

    <!-- Green bar gradient (bottom to top) -->
    <linearGradient id="bar" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <!-- Soft glow for the bars -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for the house -->
    <filter id="hshadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.20"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="13" fill="url(#bg)"/>

  <!-- Glass gloss overlay -->
  <rect width="64" height="64" rx="13" fill="url(#gloss)"/>

  <!-- ── House silhouette ── -->
  <!-- Roof: clean sharp triangle -->
  <path d="M32 9 L7 29 L57 29 Z"
        fill="white" opacity="0.96"
        filter="url(#hshadow)"/>

  <!-- House body -->
  <rect x="9" y="29" width="46" height="26" rx="0.5"
        fill="white" opacity="0.94"/>

  <!-- Door cutout (uses bg colour so it reads as negative space) -->
  <rect x="26" y="41" width="12" height="14" rx="2"
        fill="#1e1b4b" opacity="0.75"/>

  <!-- ── Ascending bar chart inside house ── -->
  <!-- 3 bars, all bottomed at y=55, ascending left-to-right -->
  <!-- Bar 1 — short -->
  <rect x="12" y="48" width="9" height="7"  rx="1.5" fill="url(#bar)" filter="url(#glow)" opacity="0.95"/>
  <!-- Bar 2 — medium -->
  <rect x="24" y="40" width="9" height="15" rx="1.5" fill="url(#bar)" filter="url(#glow)"/>
  <!-- Bar 3 — tall (right side, above door) -->
  <rect x="43" y="33" width="9" height="22" rx="1.5" fill="url(#bar)" filter="url(#glow)"/>

  <!-- Upward arrow above bar 3 -->
  <path d="M47.5 30 L47.5 33.5"
        stroke="#34d399" stroke-width="1.8" stroke-linecap="round"/>
  <path d="M45.5 32 L47.5 29 L49.5 32"
        fill="none" stroke="#34d399" stroke-width="1.8"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
